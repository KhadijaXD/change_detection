data:
  root: "./images"
  tile_size: 256
  stride: 192
  num_workers: 4

model:
  backbone: resnet50
  pretrained: true
  diff_mode: "concatenate"
  decoder_channels: [256, 128, 64, 32]

training:
  epochs: 80
  batch_size: 8
  lr: 1.0e-4
  weight_decay: 1.0e-4
  patience: 20
  device: "cuda"

logging:
  save_dir: "./checkpoints"
  log_interval: 10